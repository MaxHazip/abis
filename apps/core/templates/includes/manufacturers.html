<div class="carusel_manufacturers">
    <p class="title">Производители</p>
    <div class="logos-slider">
        <div class="logos-slide">
            {% for item in manufacturers_list %}
                {% if item.logo %}
                    {% if item.website_link %}
                        <a href="{{ item.website_link }}" target="_blank" rel="noopener noreferrer">
                            <img src="{{ item.logo.url }}" alt="{{ item.name }}">
                        </a>
                    {% else %}
                        <span class="logo-no-link">
                            <img src="{{ item.logo.url }}" alt="{{ item.name }}">
                        </span>
                    {% endif %}
                {% endif %}
            {% endfor %}
        </div>

        <div class="logos-slide">

        </div>
    </div>
</div>
