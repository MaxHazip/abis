services:

  db:
    image: postgres:16-alpine 
    container_name: abis_db
    restart: unless-stopped

    enviroment:
      POSTGRES_DB: ${POSTGRES_DB:-abisdb}
      POSTGRES_USER: ${POSTGRES_USER:-abisuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-abispassword}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: abis_redis
    restart: unless-stopped

    volumes:
      - redis_data:/data

    ports:
      - "6379:6379"

    networks:
      - app-network

  web:
  
    build:
      context: .
      dockerfile: Dockerfile

    container_name: abis_web
    restart: unless_stop
    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env
    
    depends_on:
      - db
      - redis

    networks:
      - app-network

  celery:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: abis_celery
    restart: unless_stop
    command: celery -A config worker -l info
    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - db
      - redis
    
    networks:
      - app-network
    
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: abis_celery_beat
    restart: unless_stop
    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - db
      - redis

    networks:
      - app-network 

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge