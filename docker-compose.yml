services:

  db:
    image: postgres:16-alpine 
    container_name: abis_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-abisdb}
      POSTGRES_USER: ${POSTGRES_USER:-abisuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-abispassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: abis_web
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - app-network

  vite:
    image: node:20-alpine
    container_name: abis_vite
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge